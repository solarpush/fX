<div class="login-container">
  <div class="login-box">
    <div class="login-header">
      <h1>fX</h1>
      <p>Générateur de factures Typst</p>
    </div>
    
    <form (ngSubmit)="onSubmit()" class="login-form">
      @if (error()) {
        <div class="error-message">
          {{ error() }}
        </div>
      }
      
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input 
          type="password" 
          id="password" 
          [(ngModel)]="password" 
          name="password"
          placeholder="Entrez le mot de passe administrateur"
          required
          autofocus
        >
      </div>
      
      <button type="submit" class="btn-primary" style="width: 100%" [disabled]="!password() || isLoading()">
        {{ isLoading() ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>
  </div>
</div>
