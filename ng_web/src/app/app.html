<div class="app-layout">
  @if (auth.isAuthenticated() !== false) {
    <header class="app-header">
      <div class="header-content">
        <h1 class="logo">
          <a routerLink="/">fX</a>
        </h1>
        <nav class="main-nav">
          <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
          <a routerLink="/templates" routerLinkActive="active">Templates</a>
          <a routerLink="/assets" routerLinkActive="active">Assets</a>
        </nav>
        
        <div class="header-actions">
          <button (click)="auth.logout()" class="logout-btn" title="Se déconnecter">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-logout">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
          </button>
        </div>
      </div>
    </header>
  }

  <main class="app-main">
    <router-outlet />
  </main>
</div>
